<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Holy Macros — macro-friendly recipes designed for real life." />
  <title>Holy Macros</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Modak&display=swap" rel="stylesheet" />
  <style>
    :root{--cream:#f7f1e7;--cream-deep:#ece7db;--sage:#788764;--sage-dark:#5f6d51;--orange:#df6d2f;--orange-dark:#c85a22;--text:#59604f;--content-width:1180px}
    *{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;min-width:320px;background:var(--cream);color:var(--text);font-family:"DM Sans",Arial,sans-serif;-webkit-font-smoothing:antialiased}a{color:inherit;text-decoration:none}img{display:block;max-width:100%}
    .site-header{position:relative;z-index:10;padding:34px 24px 18px;background:var(--cream)}.header-inner{width:min(100%,var(--content-width));margin:0 auto}.brand{display:flex;justify-content:center}.brand img{width:clamp(210px,25vw,325px);height:auto;object-fit:contain}.nav-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;margin-top:12px}.main-nav{grid-column:2;display:flex;align-items:center;justify-content:center;gap:clamp(34px,6vw,72px)}.main-nav a{position:relative;padding:9px 0;color:var(--sage-dark);font-size:.88rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase}.main-nav a::after{content:"";position:absolute;right:0;bottom:2px;left:0;height:2px;background:var(--orange);transform:scaleX(0);transform-origin:center;transition:transform 180ms ease}.main-nav a:hover::after,.main-nav a:focus-visible::after{transform:scaleX(1)}.search-link{grid-column:3;justify-self:end;display:inline-flex;align-items:center;justify-content:center;width:46px;height:46px;color:var(--sage-dark);border-radius:50%;transition:background 180ms ease,color 180ms ease}.search-link:hover,.search-link:focus-visible{background:rgba(120,135,100,.1);color:var(--orange)}.search-link svg{width:30px;height:30px;stroke-width:1.8}
    .hero{position:relative;overflow:hidden;padding:54px 24px 70px;background:var(--cream)}.hero-inner{width:min(100%,var(--content-width));min-height:600px;margin:0 auto;display:grid;grid-template-columns:minmax(0,.92fr) minmax(420px,1.08fr);gap:clamp(42px,6vw,82px);align-items:center}.hero-copy{position:relative;z-index:3;padding:24px 0 52px}.hero-title{max-width:620px;margin:0;color:var(--sage-dark);font-family:"Modak","Cooper Black",Georgia,serif;font-size:clamp(4.4rem,7.6vw,7.2rem);font-weight:400;line-height:.88;letter-spacing:-.025em}.hero-rule{width:62px;height:4px;margin:30px 0 24px;border-radius:999px;background:var(--sage);opacity:.75}.hero-description{max-width:470px;margin:0;color:var(--text);font-size:clamp(1.03rem,1.7vw,1.22rem);line-height:1.55}.primary-button{display:inline-flex;align-items:center;gap:14px;margin-top:30px;padding:17px 26px;color:#fffaf1;background:var(--orange);border-radius:9px;box-shadow:0 12px 26px rgba(200,90,34,.18);font-size:.94rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;transition:transform 180ms ease,background 180ms ease,box-shadow 180ms ease}.primary-button:hover,.primary-button:focus-visible{transform:translateY(-2px);background:var(--orange-dark);box-shadow:0 16px 32px rgba(200,90,34,.23)}
    .hero-art{position:relative;align-self:stretch;min-height:590px}.photo-blob{position:absolute;top:20px;right:-84px;width:min(720px,58vw);height:560px;overflow:hidden;display:grid;place-items:center;background:radial-gradient(circle at 36% 32%,rgba(255,255,255,.32),transparent 28%),linear-gradient(145deg,#e7e3d7 0%,#d5d5c8 100%);border-radius:46% 54% 42% 58% / 32% 36% 64% 68%}.photo-placeholder{position:relative;z-index:2;display:grid;justify-items:center;gap:12px;color:var(--sage-dark);text-align:center;font-weight:600;letter-spacing:.03em;text-transform:uppercase}.photo-placeholder svg{width:72px;height:72px;stroke-width:1.5}.orange-shape{position:absolute;z-index:3;bottom:0;left:-34px;width:360px;height:190px;background:var(--orange);border-radius:360px 360px 0 0;box-shadow:inset 0 0 50px rgba(145,59,17,.08)}
    .section-preview{padding:8px 24px 80px;background:var(--cream)}.category-row{width:min(100%,var(--content-width));margin:0 auto;display:grid;grid-template-columns:repeat(5,1fr);gap:14px}.category-card{min-height:142px;display:grid;place-items:center;padding:20px 12px;background:rgba(236,231,219,.74);border:1px solid rgba(255,255,255,.42);border-radius:13px;color:var(--sage-dark);font-size:.82rem;font-weight:700;letter-spacing:.1em;text-align:center;text-transform:uppercase}.category-icon{width:54px;height:54px;margin-bottom:12px;border:2px solid currentColor;border-radius:50%;opacity:.9}
    @media(max-width:900px){.site-header{padding-top:24px}.nav-row{grid-template-columns:1fr auto;margin-top:4px}.main-nav{grid-column:1;justify-content:flex-start;gap:26px}.search-link{grid-column:2}.hero{padding-top:30px}.hero-inner{min-height:auto;grid-template-columns:1fr}.hero-copy{padding-bottom:0}.hero-title{max-width:700px}.hero-art{min-height:500px}.photo-blob{top:0;right:-110px;width:760px;max-width:110vw;height:500px}.orange-shape{left:6%}.category-row{grid-template-columns:repeat(3,1fr)}}
    @media(max-width:620px){.site-header{padding-right:18px;padding-left:18px}.brand img{width:min(270px,78vw)}.nav-row{display:flex;justify-content:center;margin-top:10px}.main-nav{gap:24px}.main-nav a{font-size:.72rem;letter-spacing:.11em}.search-link{display:none}.hero{padding:28px 18px 46px}.hero-inner{gap:32px}.hero-title{font-size:clamp(3.7rem,19vw,5.4rem)}.hero-description{font-size:1rem}.hero-art{min-height:410px}.photo-blob{right:-120px;width:650px;height:410px}.orange-shape{left:-18px;width:250px;height:128px}.section-preview{padding-right:18px;padding-left:18px}.category-row{grid-template-columns:repeat(2,1fr)}.category-card:last-child{grid-column:1/-1}}
    @media(prefers-reduced-motion:reduce){html{scroll-behavior:auto}*,*::before,*::after{transition-duration:.01ms!important}}
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="#" aria-label="Holy Macros home"><img src="assets/holy-macros-logo.png" alt="Holy Macros" /></a>
      <div class="nav-row">
        <nav class="main-nav" aria-label="Main navigation"><a href="#recipes">Recipes</a><a href="#about">About</a><a href="#contact">Contact</a></nav>
        <a class="search-link" href="#recipes" aria-label="Search recipes"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true"><circle cx="11" cy="11" r="7"></circle><path d="m20 20-4-4"></path></svg></a>
      </div>
    </div>
  </header>
  <main>
    <section class="hero" aria-labelledby="hero-title">
      <div class="hero-inner">
        <div class="hero-copy">
          <h1 class="hero-title" id="hero-title">Good Food.<br />Real Simple.</h1>
          <div class="hero-rule" aria-hidden="true"></div>
          <p class="hero-description">Macro-friendly recipes designed to fit busy everyday lives and satisfy every foodie's cravings.</p>
          <a class="primary-button" href="#recipes">Browse Recipes <span aria-hidden="true">→</span></a>
        </div>
        <div class="hero-art" aria-label="Photography placeholder">
          <div class="photo-blob"><div class="photo-placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true"><rect x="3" y="4" width="18" height="16" rx="2"></rect><circle cx="8.5" cy="9" r="1.5"></circle><path d="m4 18 5-5 3 3 2-2 6 6"></path></svg><span>Your photo<br />here</span></div></div>
          <div class="orange-shape" aria-hidden="true"></div>
        </div>
      </div>
    </section>
    <section class="section-preview" id="recipes" aria-label="Recipe categories preview">
      <div class="category-row">
        <div class="category-card"><div><div class="category-icon"></div>Breakfast</div></div>
        <div class="category-card"><div><div class="category-icon"></div>Lunch</div></div>
        <div class="category-card"><div><div class="category-icon"></div>Dinner</div></div>
        <div class="category-card"><div><div class="category-icon"></div>Dessert</div></div>
        <div class="category-card"><div><div class="category-icon"></div>Snacks</div></div>
      </div>
    </section>
  </main>
</body>
</html>
