<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Holy Macros — macro-friendly recipes designed for real life." />
  <title>Holy Macros</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Modak&display=swap" rel="stylesheet" />

</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="#" aria-label="Holy Macros home"><img src="assets/holy-macros-logo.png" alt="Holy Macros" /></a>
      <div class="nav-row">
        <nav class="main-nav" aria-label="Main navigation"><a href="#recipes">Recipes</a><a href="#about">About</a><a href="#contact">Contact</a></nav>
        <a class="search-link" href="#recipes" aria-label="Search recipes"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true"><circle cx="11" cy="11" r="7"></circle><path d="m20 20-4-4"></path></svg></a>
      </div>
    </div>
  </header>
  <main>
    <section class="hero" aria-labelledby="hero-title">
      <div class="hero-inner">
        <div class="hero-copy">
          <h1 class="hero-title" id="hero-title">Good Food.<br />Real Simple.</h1>
          <div class="hero-rule" aria-hidden="true"></div>
          <p class="hero-description">Macro-friendly recipes designed to fit busy everyday lives and satisfy every foodie's cravings.</p>
          <a class="primary-button" href="#recipes">Browse Recipes <span aria-hidden="true">→</span></a>
        </div>
        <div class="hero-art" aria-label="Photography placeholder">
          <div class="photo-blob"><div class="photo-placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true"><rect x="3" y="4" width="18" height="16" rx="2"></rect><circle cx="8.5" cy="9" r="1.5"></circle><path d="m4 18 5-5 3 3 2-2 6 6"></path></svg><span>Your photo<br />here</span></div></div>
          <div class="orange-shape" aria-hidden="true"></div>
        </div>
      </div>
    </section>
    <section class="section-preview" id="recipes" aria-label="Recipe categories preview">
      <div class="category-row">
        <div class="category-card"><div><div class="category-icon"></div>Breakfast</div></div>
        <div class="category-card"><div><div class="category-icon"></div>Lunch</div></div>
        <div class="category-card"><div><div class="category-icon"></div>Dinner</div></div>
        <div class="category-card"><div><div class="category-icon"></div>Dessert</div></div>
        <div class="category-card"><div><div class="category-icon"></div>Snacks</div></div>
      </div>
    </section>
  </main>
</body>
</html>
